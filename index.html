<script>
// ============ CLOUD STORAGE CONFIG ============
const STORAGE_KEY = 'school87_data_v6';
const BIN_ID_KEY = 'school87_bin_id_v6';
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';
const JSONBIN_API_KEY = '$2a$10$/ICj4/0kvfEnSiZH5Fi0l.vsT14TjWUte8HNWwYmud8wiDn/BmB9W';

let syncStatus = 'idle';
let lastSyncTime = null;
let syncTimeout = null;
let pollInterval = null;

const GROUPS = ['А','Б','В','Г','Д','Е','Ж','З','И','К','Л','М'];
const GRADES_NUM = Array.from({length:12}, (_,i) => i+1);

const DEFAULT_DATA = {
  currentUser: null,
  announcements: [
    { id: 1, title: "Сургуулийн санамж", content: "2025-2026 оны хичээлийн жилийн шалгалтын хуваарь", date: "2026-05-15", createdBy: "Администратор" }
  ],
  classes: [
    { id: 1, name: "10-А", grade: "10", group: "А", teacherId: 2 },
    { id: 2, name: "10-Б", grade: "10", group: "Б", teacherId: 3 }
  ],
  users: [
    { id: 1, regNumber: "1А0001", password: "admin123", name: "С.Саруул", role: "admin" },
    { id: 2, regNumber: "10А0001", password: "teacher1", name: "Б.Болормаа", role: "teacher", subject: "Математик" },
    { id: 3, regNumber: "9Б0001", password: "teacher2", name: "Д.Дорж", role: "teacher", subject: "Физик" },
    { id: 4, regNumber: "10А0002", password: "1234", name: "Б.Батбаяр", role: "student", grade: "10-А" },
    { id: 5, regNumber: "10А0003", password: "1234", name: "Г.Гэрэлчимэг", role: "student", grade: "10-А" },
    { id: 6, regNumber: "10Б0001", password: "1234", name: "Ө.Өнөмандах", role: "student", grade: "10-Б" }
  ],
  exams: [
    {
      id: 1, title: "Математик 10 - Квадрат тэгшитгэл", subject: "Математик", grade: "10",
      description: "Квадрат тэгшитгэлийн үндсэн ойлголт", duration: 45, totalPoints: 100, passingScore: 60,
      createdByName: "Б.Болормаа", status: "active", examCode: "1234",
      questions: [
        { id: 1, type: "multiple", question: "x² - 5x + 6 = 0 тэгшитгэлийг бод", options: ["x = 2, x = 3", "x = 1, x = 6", "x = -2, x = -3", "x = 0, x = 5"], correctAnswer: 0, points: 10, image: "" },
        { id: 2, type: "multiple", question: "2x² + 7x + 3 = 0 тэгшитгэлийн язгуур нь?", options: ["x = -1/2, x = -3", "x = 1/2, x = 3", "x = -1, x = -3/2", "x = 1, x = 3/2"], correctAnswer: 0, points: 10, image: "" },
        { id: 3, type: "truefalse", question: "Квадрат тэгшитгэл нь хамгийн ихдээ 2 язгууртай байдаг", correctAnswer: true, points: 5 },
        { id: 4, type: "multiple", question: "x² - 4 = 0 тэгшитгэлийн шийд нь?", options: ["x = ±2", "x = 2", "x = -2", "x = ±4"], correctAnswer: 0, points: 10 },
        { id: 5, type: "multiple", question: "Квадрат тэгшитгэлийн ерөнхий хэлбэр нь?", options: ["ax² + bx + c = 0", "ax + b = 0", "x² + y² = r²", "y = mx + b"], correctAnswer: 0, points: 10 }
      ]
    }
  ],
  submissions: [],
  activityLog: []
};

let data = JSON.parse(JSON.stringify(DEFAULT_DATA));

// ============ STORAGE ============
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadLocal() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}
function getBinId() {
  const urlParams = new URLSearchParams(window.location.search);
  const urlBin = urlParams.get('bin');
  if (urlBin) { localStorage.setItem(BIN_ID_KEY, urlBin); return urlBin; }
  return localStorage.getItem(BIN_ID_KEY);
}
function setBinId(id) {
  localStorage.setItem(BIN_ID_KEY, id);
  const url = new URL(window.location.href);
  url.searchParams.set('bin', id);
  window.history.replaceState({}, '', url.toString());
}
async function createNewBin() {
  try {
    const response = await fetch(`${JSONBIN_BASE}/b`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Private': 'false', 'X-Bin-Name': 'school87-data-' + Date.now() },
      body: JSON.stringify(data)
    });
    if (!response.ok) throw new Error('Create failed');
    const result = await response.json();
    const binId = result.metadata.id;
    setBinId(binId);
    return binId;
  } catch(e) { return null; }
}
async function saveToCloud() {
  const binId = getBinId();
  if (!binId) return false;
  try {
    updateSyncStatus('syncing');
    const response = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Versioning': 'false' },
      body: JSON.stringify(data)
    });
    if (!response.ok) throw new Error('Update failed');
    updateSyncStatus('synced');
    lastSyncTime = new Date();
    return true;
  } catch(e) { updateSyncStatus('error'); return false; }
}
async function loadFromCloud() {
  const binId = getBinId();
  if (!binId) return null;
  try {
    updateSyncStatus('syncing');
    const response = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, { headers: { 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Meta': 'false' } });
    if (!response.ok) throw new Error('Load failed');
    const cloudData = await response.json();
    updateSyncStatus('synced');
    lastSyncTime = new Date();
    return cloudData.record || cloudData;
  } catch(e) { updateSyncStatus('offline'); return null; }
}
function updateSyncStatus(status) {
  syncStatus = status;
  const indicator = document.getElementById('sync-indicator');
  if (!indicator) return;
  const map = {
    syncing: ['🔄','Синхрончилж байна...','rgba(255,255,255,0.6)'],
    synced:  ['✅','Хадгалагдсан','rgba(255,255,255,0.8)'],
    error:   ['⚠️','Алдаа','#fca5a5'],
    offline: ['📱','Локал','rgba(255,255,255,0.6)'],
    idle:    ['💾','Бэлэн','rgba(255,255,255,0.6)']
  };
  const [icon, text, color] = map[status] || map.idle;
  indicator.innerHTML = `<span style="color:${color};font-size:11px;font-weight:700;cursor:pointer;" onclick="showSyncSettings()">${icon} ${text}</span>`;
}
function saveData() {
  saveLocal();
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async () => {
    const binId = getBinId();
    if (binId) await saveToCloud();
    else updateSyncStatus('offline');
  }, 1000);
}
async function initData() {
  const localData = loadLocal();
  if (localData && localData.users) {
    data = localData;
    if (!data.activityLog) data.activityLog = [];
  }
  const binId = getBinId();
  if (binId) {
    const cloudData = await loadFromCloud();
    if (cloudData && cloudData.users) {
      data = cloudData;
      if (!data.activityLog) data.activityLog = [];
      saveLocal();
    }
  } else {
    updateSyncStatus('offline');
  }
  if (binId && !pollInterval) {
    pollInterval = setInterval(async () => {
      if (syncStatus === 'syncing') return;
      const cloudData = await loadFromCloud();
      if (cloudData && cloudData.users) {
        const cloudLogCount = (cloudData.activityLog||[]).length;
        const localLogCount = (data.activityLog||[]).length;
        if (cloudLogCount !== localLogCount ||
            JSON.stringify(cloudData.users.length) !== JSON.stringify(data.users.length) ||
            JSON.stringify(cloudData.exams.length) !== JSON.stringify(data.exams.length)) {
          const preservedUser = data.currentUser;
          data = cloudData;
          if (!data.activityLog) data.activityLog = [];
          if (preservedUser) data.currentUser = preservedUser;
          saveLocal();
          if (preservedUser && (preservedUser.role === 'admin') && currentView === 'activity-log') render();
        }
      }
    }, 30000);
  }
}

async function setupNewCloud() {
  if (!confirm('Шинэ cloud storage үүсгэх үү?')) return;
  updateSyncStatus('syncing');
  const binId = await createNewBin();
  if (binId) { alert('✅ Cloud үүсгэгдлээ!\n\nBin ID: ' + binId + '\n\nURL-г бусад төхөөрөмжид хуулна уу.'); closeModal(); showSyncSettings(); }
  else alert('❌ Cloud үүсгэхэд алдаа гарлаа. Интернэт холболтоо шалгана уу.');
}
async function connectToBin() {
  const id = document.getElementById('bin-input').value.trim();
  if (!id) { alert('Bin ID оруулна уу'); return; }
  setBinId(id);
  updateSyncStatus('syncing');
  const cloudData = await loadFromCloud();
  if (cloudData && cloudData.users) {
    data = cloudData;
    if (!data.activityLog) data.activityLog = [];
    saveLocal();
    alert('✅ Холбогдлоо!'); closeModal(); render();
  } else alert('❌ Bin ID олдсонгүй.');
}
function disconnectCloud() {
  if (!confirm('Cloud-аас салгах уу?')) return;
  localStorage.removeItem(BIN_ID_KEY);
  const url = new URL(window.location.href);
  url.searchParams.delete('bin');
  window.history.replaceState({}, '', url.toString());
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  updateSyncStatus('offline'); closeModal();
}
async function forceSync() { await saveToCloud(); alert('Синхрончлогдлоо!'); }

function logActivity(action, details) {
  if (!data.activityLog) data.activityLog = [];
  const entry = {
    id: Date.now() + Math.random(),
    timestamp: new Date().toISOString(),
    userId: data.currentUser ? data.currentUser.id : null,
    userName: data.currentUser ? data.currentUser.name : 'Тодорхойгүй',
    userRole: data.currentUser ? data.currentUser.role : 'guest',
    regNumber: data.currentUser ? data.currentUser.regNumber : '',
    action, details: details || ''
  };
  data.activityLog.unshift(entry);
  if (data.activityLog.length > 500) data.activityLog = data.activityLog.slice(0, 500);
}
function formatLogTime(iso) {

}

function handleLogin() {
  if (currentLoginTab === 'teacher') handleTeacherLogin();
  else handleStudentLogin();
}
function handleTeacherLogin() {
  const username = (document.getElementById('teacher-username').value || '').trim();
  const pwd = (document.getElementById('teacher-password').value || '').trim();
  const errBox = document.getElementById('login-error');
  if (!username || !pwd) { errBox.textContent = 'Нэвтрэх нэр болон нууц үгийг оруулна уу!'; errBox.classList.remove('hidden'); return; }
  const user = data.users.find(u => (u.role === 'admin' || u.role === 'teacher') && u.regNumber === username && u.password === pwd);
  if (!user) { errBox.textContent = 'Нэвтрэх нэр эсвэл нууц үг буруу байна!'; errBox.classList.remove('hidden'); return; }
  errBox.classList.add('hidden');
  data.currentUser = user;
  logActivity('Нэвтрэлт', `${user.role === 'admin' ? 'Админ' : 'Багш'} нэвтэрлээ`);
  saveData();
  showApp();
}
function handleStudentLogin() {
  const grade = document.getElementById('prefix1').value;
  const group = document.getElementById('prefix2').value;
  const num = (document.getElementById('reg-number').value || '').toString().padStart(4,'0');
  const examCode = (document.getElementById('exam-code').value || '').trim();
  const errBox = document.getElementById('login-error-student');
  if (!grade || !group || num.length < 4 || !/^\d{4}$/.test(num)) {
    errBox.textContent = 'Анги, бүлэг, РД дугаараа бүгдийг оруулна уу!'; errBox.classList.remove('hidden'); return;
  }
  if (!examCode || examCode.length !== 4) {
    errBox.textContent = 'Багшийн сорилын 4 оронтой кодыг оруулна уу!'; errBox.classList.remove('hidden'); return;
  }
  const reg = grade + group + num;
  let student = data.users.find(u => u.role === 'student' && u.regNumber === reg);
  if (!student) { errBox.textContent = 'Энэ РД дугаартай сурагч бүртгэлгүй байна! Багшдаа хандана уу.'; errBox.classList.remove('hidden'); return; }
  const exam = data.exams.find(e => e.examCode === examCode && e.status === 'active');
  if (!exam) { errBox.textContent = 'Сорилын код буруу эсвэл сорил идэвхгүй байна!'; errBox.classList.remove('hidden'); return; }
  errBox.classList.add('hidden');
  data.currentUser = student;
  logActivity('Нэвтрэлт', `Сурагч ${student.name} (${reg}) "${exam.title}" сорилд орлоо`);
  saveData();
  showApp();
  setTimeout(() => startExam(exam.id), 200);
}

function generateExamCode() {
  let code, attempts = 0;
  do { code = String(Math.floor(1000 + Math.random() * 9000)); attempts++; }
  while (data.exams.find(e => e.examCode === code) && attempts < 100);
  return code;
}
function saveExam() {
  saveCurrentExamForm();
  if (!newExamData.title || !newExamData.subject) { alert('Гарчиг ба хичээл оруулна уу!'); return; }
  if (newExamData.questions.length === 0) { alert('Доод тал нь 1 асуулт оруулна уу!'); return; }
  newExamData.totalPoints = newExamData.questions.reduce((s,q) => s + (q.points||0), 0);
  newExamData.id = Date.now();
  newExamData.createdByName = data.currentUser.name;

function parseQuestions(text, basePoints) {
  const questions = [];
  const blocks = text.split(/\n\s*\n/).filter(b => b.trim());
  blocks.forEach((block, idx) => {
    const lines = block.split('\n').map(l => l.trim()).filter(l => l);
    if (lines.length === 0) return;
    let questionText = lines[0].replace(/^\d+[\.\)]\s*/, '').trim();
    const optionLines = lines.slice(1);
    const isTrueFalse = optionLines.length <= 2 && optionLines.every(l => /^(Үнэн|Худал|Тийм|Үгүй|True|False)/i.test(l));
    if (isTrueFalse && optionLines.length > 0) {
      const correctLine = optionLines.find(l => /[*+]/.test(l)) || optionLines[0];
      const isTrue = /^(Үнэн|Тийм|True)/i.test(correctLine);
      questions.push({ id: Date.now() + idx, type: 'truefalse', question: questionText, correctAnswer: isTrue, points: basePoints });
    } else if (optionLines.length >= 2) {
      const options = [];
      let correctIdx = 0;
      optionLines.forEach((line, i) => {
        const hasMarker = /[*+]/.test(line);
        let cleaned = line.replace(/^[A-DА-Я][\.\)]\s*/i, '').replace(/[*+]/g, '').trim();
        options.push(cleaned);
        if (hasMarker) correctIdx = i;
      });
      while (options.length < 4) options.push('');
      questions.push({ id: Date.now() + idx, type: 'multiple', question: questionText, options: options.slice(0, 4), correctAnswer: correctIdx, points: basePoints, image: '' });
    }
  });
  return questions;
}
function doBulkImport() {
  const title = document.getElementById('bi-title').value;
  const subject = document.getElementById('bi-subject').value;
  if (!title || !subject) { alert('Гарчиг ба хичээл оруулна уу!'); return; }
  const text = document.getElementById('bi-text').value;
  if (!text.trim()) { alert('Асуултын текст оруулна уу!'); return; }
  const basePoints = parseInt(document.getElementById('bi-points').value) || 10;
  const questions = parseQuestions(text, basePoints);
  if (questions.length === 0) { alert('Асуулт парсэлж чадсангүй! Форматыг шалгана уу.'); return; }
  const exam = {
    id: Date.now(), title, subject,
    grade: document.getElementById('bi-grade').value || '10',
    description: '',
    duration: parseInt(document.getElementById('bi-duration').value) || 45,
    passingScore: parseInt(document.getElementById('bi-passing').value) || 60,
    totalPoints: questions.reduce((s, q) => s + q.points, 0),
    questions, createdByName: data.currentUser.name, status: 'active',
    examCode: generateExamCode()
  };
  data.exams.push(exam);
  logActivity('Сорил үүсгэв', `[Хуулж] "${exam.title}" (${questions.length} асуулт, код: ${exam.examCode})`);
  saveData();
  alert(`✅ Амжилттай! ${questions.length} асуулт оруулагдлаа.\n\n🔑 Нууц код: ${exam.examCode}\n\nЭнэ кодыг сурагчдад өгнө үү!`);
  navigate('dashboard');
}

    const group = document.getElementById('au-b').value;

    if (!grade || !group || !/^\d{4}$/.test(num)) { alert('Анги, бүлэг, РД бүрэн оруулна уу!'); return; }
    const reg = grade + group + num;
    const lastName = (document.getElementById('au-lastname').value||'').trim();
    const firstName = (document.getElementById('au-firstname').value||'').trim();
    if (!lastName || !firstName) { alert('Овог, нэрийг оруулна уу!'); return; }

    if (data.users.find(u => u.regNumber === reg)) { alert('Энэ РД дугаар аль хэдийн бүртгэлтэй!'); return; }
    const className = grade + '-' + group;
    data.users.push({ id: Date.now(), regNumber: reg, password: pwd, name, role: 'student', grade: className });
    logActivity('Хэрэглэгч нэмэв', `${name} (${reg}) сурагч нэмэгдлээ`);
  } else {
    const name = (document.getElementById('au-name') ? document.getElementById('au-name').value : '').trim();
    const username = (document.getElementById('au-username') ? document.getElementById('au-username').value : '').trim();
    const subject = (document.getElementById('au-subject') ? document.getElementById('au-subject').value : '').trim();
    if (!name || !username) { alert('Нэр болон нэвтрэх кодыг оруулна уу!'); return; }
    if (data.users.find(u => u.regNumber === username)) { alert('Энэ нэвтрэх код аль хэдийн бүртгэлтэй!'); return; }
    data.users.push({ id: Date.now(), regNumber: username, password: pwd, name, role: 'teacher', subject });
    logActivity('Хэрэглэгч нэмэв', `${name} багш нэмэгдлээ`);
  }
  saveData(); closeModal(); render();
}

function downloadTemplate(type) {
  const wb = XLSX.utils.book_new();
  const headers = type === 'student'
    ? [['Овог.Нэр', 'РД (Нэвтрэх код)', 'Нууц үг', 'Анги'], ['Батбаяр.Гэрэлмаа', '10А0001', '1234', '10-А']]
    : [['Овог.Нэр', 'Нэвтрэх код', 'Нууц үг', 'Судлагдахуун'], ['Болормаа.Сарнай', 'bagsh001', 'teacher1', 'Математик']];
  const ws = XLSX.utils.aoa_to_sheet(headers);
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, `${type === 'student' ? 'suraguud' : 'bagsh'}_template.xlsx`);
}
function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const role = document.getElementById('import-role').value;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      let added = 0, skipped = 0, errors = [];
      rows.slice(1).forEach((row, i) => {
        if (!row[0] || !row[1]) { errors.push(`Мөр ${i+2}: нэр эсвэл код дутуу`); skipped++; return; }
        const name = String(row[0]).trim();
        const regNumber = String(row[1]).trim();
        const password = String(row[2] || '1234').trim();
        const grade = String(row[3] || '').trim();
        if (data.users.find(u => u.regNumber === regNumber)) { errors.push(`${regNumber} аль хэдийн бүртгэлтэй`); skipped++; return; }
        data.users.push({ id: Date.now() + Math.random(), name, regNumber, password, role, grade: role === 'student' ? grade : '', subject: role === 'teacher' ? grade : '' });
        added++;
      });
      saveData();
      const res = document.getElementById('import-result');
      res.classList.remove('hidden');
      res.style.background = added > 0 ? '#f0fdf4' : '#fef9c3';
      res.style.border = `2px solid ${added > 0 ? '#bbf7d0' : '#fde68a'}`;
      res.innerHTML = `✅ ${added} хэрэглэгч нэмэгдлээ${skipped > 0 ? ` • ⏭️ ${skipped} алгасав` : ''}${errors.length ? '<br><small style="color:#dc2626;">' + errors.slice(0,3).join('<br>') + '</small>' : ''}`;
      logActivity('Excel оруулав', `${added} ${role === 'student' ? 'сурагч' : 'багш'} нэмэгдлээ`);
    } catch(err) { alert('Excel файл уншихад алдаа гарлаа: ' + err.message); }
  };
  reader.readAsBinaryString(file);
}

function doClassImport(classId) {
  const cls = data.classes ? data.classes.find(c => c.id === classId) : null;
  if (!cls) return;
  const text = document.getElementById('class-import-text').value.trim();
  const pwd = document.getElementById('class-import-pwd').value || '1234';
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
  if (!lines.length) { alert('Нэрсийн жагсаалт оруулна уу!'); return; }
  const existingStudents = data.users.filter(u => u.role === 'student' && u.grade === cls.name);
  let rdCounter = existingStudents.length + 1;
  let added = 0, skipped = 0, errLines = [];
  lines.forEach((line, i) => {
    const parts = line.trim().split(/\s+/);
    if (parts.length < 2) { errLines.push(`Мөр ${i+1}: "${line}"`); skipped++; return; }
    const lastname = parts[0], firstname = parts[1];
    const rdRaw = parts[2] ? parts[2].padStart(4,'0') : String(rdCounter).padStart(4,'0');
    const name = lastname + '.' + firstname;
    const reg = cls.grade + cls.group + rdRaw;
    if (data.users.find(u => u.regNumber === reg)) { errLines.push(`${reg} аль хэдийн бүртгэлтэй`); skipped++; return; }
    data.users.push({ id: Date.now() + Math.random(), name, regNumber: reg, password: pwd, role: 'student', grade: cls.name });
    added++; rdCounter++;
  });
  saveData();
  const res = document.getElementById('class-import-result');
  res.classList.remove('hidden');
  res.style.background = added > 0 ? '#f0fdf4' : '#fef9c3';
  res.style.border = `2px solid ${added > 0 ? '#bbf7d0' : '#fde68a'}`;
  res.innerHTML = `✅ ${added} сурагч нэмэгдлээ${skipped>0?' • ⏭️ '+skipped+' алгасав':''}${errLines.length?'<br><small style="color:#dc2626;">'+errLines.slice(0,3).join('<br>')+'</small>':''}`;
}

// ============ TAKING EXAM ============
function startExam(examId) {
  currentExam = data.exams.find(e => e.id === examId);
  currentAnswers = {};
  timeRemaining = currentExam.duration * 60;
  if (timerInterval) clearInterval(timerInterval);
  // Show floating timer
  const timerEl = document.getElementById('timer-float');
  timerEl.classList.remove('hidden');
  timerInterval = setInterval(() => {
    timeRemaining--;
    const m = Math.floor(timeRemaining/60), s = timeRemaining%60;
    const str = `${m}:${s.toString().padStart(2,'0')}`;
    timerEl.textContent = str;
    const t = document.getElementById('timer-display');
    if (t) t.textContent = str;
    if (timeRemaining < 300) {
      timerEl.style.background = '#ef4444';
      if (t) t.classList.add('timer-warning');
    }
    if (timeRemaining <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
  navigate('taking-exam');
}

function setAnswer(qIdx, val) { currentAnswers[qIdx] = val; }

function submitExam() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('timer-float').classList.add('hidden');
  const exam = currentExam;
  let score = 0;
  const answers = [];
  exam.questions.forEach((q, i) => {
    const ans = currentAnswers[i];
    answers.push(ans);
    if (q.type === 'multiple' && ans === q.correctAnswer) score += q.points;
    if (q.type === 'truefalse' && ans === q.correctAnswer) score += q.points;
  });
  const percentage = Math.round((score / exam.totalPoints) * 100);
  const submission = {
    id: Date.now(), examId: exam.id, studentId: data.currentUser.id,
    studentName: data.currentUser.name, regNumber: data.currentUser.regNumber,
    grade: data.currentUser.grade, submittedAt: new Date().toLocaleString('mn-MN'),
    duration: Math.floor((exam.duration*60 - timeRemaining)/60),
    answers, score, percentage, passed: score >= exam.passingScore
  };
  data.submissions.push(submission);
  logActivity('Сорил өгсөн', `"${exam.title}" - ${score}/${exam.totalPoints} (${percentage}%, ${submission.passed?'тэнцсэн':'унасан'})`);
  saveData();
  window.lastSubmission = submission;
  navigate('results');
}

// ============ RESULTS ============
function renderResults() {
  const sub = window.lastSubmission;
  if (!sub) return renderStudentHome();
  const exam = data.exams.find(e => e.id === sub.examId);
  return `
    <div style="background:${sub.passed?'linear-gradient(135deg,#10b981,#059669)':'linear-gradient(135deg,#ef4444,#dc2626)'};border-radius:20px;padding:24px;margin-bottom:16px;text-align:center;color:white;">
      <div style="font-size:60px;margin-bottom:12px;">${sub.passed ? '🎉' : '😢'}</div>
      <h2 style="font-size:24px;font-weight:900;margin:0 0 6px;">${sub.passed ? 'Баяр хүргэе! Тэнцлээ!' : 'Уучлаарай, унасан байна'}</h2>
      <p style="opacity:0.85;margin:0;font-size:13px;">${exam.title}</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;">
      <div style="background:white;border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
        <div style="font-size:22px;font-weight:900;color:#1d4ed8;">${sub.score}/${exam.totalPoints}</div>
        <div style="font-size:11px;color:#6b7280;">Авсан оноо</div>
      </div>
      <div style="background:white;border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
        <div style="font-size:22px;font-weight:900;color:#6d28d9;">${sub.percentage}%</div>
        <div style="font-size:11px;color:#6b7280;">Хувь</div>
      </div>
      <div style="background:white;border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
        <div style="font-size:22px;font-weight:900;color:#166534;">${sub.duration}</div>
        <div style="font-size:11px;color:#6b7280;">минут</div>
      </div>
    </div>
    <p class="section-title">📝 Асуулт бүрийн хариулт</p>
    <div>
      ${exam.questions.map((q, i) => {
        const myAns = sub.answers[i];
        const correct = (q.type === 'multiple' && myAns === q.correctAnswer) || (q.type === 'truefalse' && myAns === q.correctAnswer);
        return `
          <div style="background:white;border-radius:16px;padding:14px;margin-bottom:8px;border-left:4px solid ${correct?'#10b981':'#ef4444'};">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-weight:900;font-size:13px;color:#6b7280;">Асуулт ${i+1}</span>
              <span style="font-weight:900;font-size:13px;color:${correct?'#10b981':'#ef4444'};">${correct ? '✅ Зөв' : '❌ Буруу'} (+${correct?q.points:0}/${q.points})</span>
            </div>
            <p style="font-size:14px;font-weight:700;margin:0 0 10px;">${q.question}</p>
            ${q.type === 'multiple' ? `
              <div style="display:flex;flex-direction:column;gap:4px;">
                ${q.options.map((opt, idx) => `
                  <div style="font-size:13px;padding:6px 10px;border-radius:8px;background:${idx===q.correctAnswer?'#dcfce7':idx===myAns&&!correct?'#fef2f2':'transparent'};color:${idx===q.correctAnswer?'#166534':idx===myAns&&!correct?'#dc2626':'#6b7280'};font-weight:${idx===q.correctAnswer||idx===myAns?'700':'400'};">
                    ${['A','B','C','D'][idx]}. ${opt}${idx===q.correctAnswer?' ✓':''}${idx===myAns&&idx!==q.correctAnswer?' ← Таны хариулт':''}
                  </div>`).join('')}
              </div>` : `
              <div style="font-size:13px;color:#6b7280;">Зөв хариулт: <strong style="color:#166534;">${q.correctAnswer?'✓ Үнэн':'✗ Худал'}</strong></div>`}
          </div>`;
      }).join('')}
    </div>
    <button onclick="navigate('dashboard')" class="btn-primary" style="margin-top:8px;">← Нүүр хуудас руу буцах</button>`;
}

function renderMyResults() {
  const mySubmissions = data.submissions.filter(s => s.studentId === data.currentUser.id);
  return `
    <div style="background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:20px;padding:20px;margin-bottom:16px;color:white;">
      <p style="opacity:0.8;font-size:13px;margin:0 0 4px;">Бүх шалгалтын дүн</p>
      <h2 style="font-size:22px;font-weight:900;margin:0;">📊 Миний үр дүнгүүд</h2>
    </div>
    ${mySubmissions.length === 0 ? `
      <div style="text-align:center;padding:40px;background:white;border-radius:20px;color:#9ca3af;">
        <div style="font-size:48px;margin-bottom:12px;">📋</div>
        <p style="font-weight:700;">Та шалгалт өгөөгүй байна</p>
      </div>` :
      mySubmissions.map(s => {
        const exam = data.exams.find(e => e.id === s.examId);
        return `
          <div class="card" style="padding:16px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
              <div style="flex:1;padding-right:10px;">
                <div style="font-weight:900;font-size:14px;margin-bottom:4px;">${exam ? exam.title : 'Устгагдсан сорил'}</div>
                <div style="font-size:12px;color:#6b7280;">📅 ${s.submittedAt}</div>
              </div>
              <div style="text-align:right;">
                <div style="font-weight:900;font-size:22px;color:${s.passed?'#166534':'#991b1b'};">${s.percentage}%</div>
                <div style="font-size:11px;color:#9ca3af;">${s.score}/${exam?exam.totalPoints:'?'}</div>
              </div>
            </div>
            <div style="background:${s.passed?'#f0fdf4':'#fef2f2'};border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;">
              <span style="font-weight:700;font-size:13px;color:${s.passed?'#166534':'#991b1b'};">${s.passed?'✅ Тэнцсэн':'❌ Унасан'}</span>
              <div class="result-bar-bg" style="width:120px;margin:0;">
                <div class="result-bar-fill" style="width:${s.percentage}%;background:${s.passed?'#10b981':'#ef4444'};"></div>
              </div>
            </div>
          </div>`;
      }).join('')}`;
}

// ============ MODAL ============
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function closeModalOnOverlay(e) { if (e.target.id === 'modal') closeModal(); }
</script>
</body>
</html>
