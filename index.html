    /* ── Hide scrollbar ── */

    /* ── Hidden ── */

    /* ── Modal ── */

      background: white;

      overflow-y: auto;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));

  try { localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg)); } catch {}

// Save config (users, exams, etc.) to Firestore
async function saveToCloud() {
  if (!isFirebaseReady()) { updateSyncStatus('offline'); return false; }
  try {
    updateSyncStatus('syncing');
    const configData = {
      users: data.users || [],
      exams: data.exams || [],
      announcements: data.announcements || [],
      classes: data.classes || [],
      subjects: data.subjects || [],
      posters: data.posters || [],
      sentAnalyses: data.sentAnalyses || [],
      activityLog: (data.activityLog || []).slice(0, 200),
      updatedAt: new Date().toISOString()
    };
    await db.collection('school87').doc('config').set(configData);
    updateSyncStatus('synced');
    lastSyncTime = new Date();
    return true;
  } catch(e) { console.error('Save error:', e); updateSyncStatus('error'); return false; }
}

// Load config from Firestore
async function loadFromCloud() {
  if (!isFirebaseReady()) return null;
  try {
    updateSyncStatus('syncing');
    const doc = await db.collection('school87').doc('config').get();
    updateSyncStatus('synced');
    lastSyncTime = new Date();
    return doc.exists ? doc.data() : null;
  } catch(e) { console.error('Load error:', e); updateSyncStatus('error'); return null; }
}

// Save a single submission directly (no conflicts!)
async function saveSubmissionToCloud(submission) {
  if (!isFirebaseReady()) return false;
  try {
    await db.collection('school87').doc('submissions').collection('items')
      .doc(String(submission.id)).set(submission);
    return true;
  } catch(e) { console.error('Submission save error:', e); return false; }
}

// Load all submissions from Firestore
async function loadSubmissionsFromCloud() {
  if (!isFirebaseReady()) return null;
  try {
    const snap = await db.collection('school87').doc('submissions').collection('items').get();
    return snap.docs.map(d => d.data());
  } catch(e) { console.error('Submissions load error:', e); return null; }
}

// Real-time listener for submissions
function startSubmissionsListener() {
  if (!isFirebaseReady()) return;
  if (submissionsUnsubscribe) submissionsUnsubscribe();
  submissionsUnsubscribe = db.collection('school87').doc('submissions').collection('items')
    .onSnapshot(snap => {
      data.submissions = snap.docs.map(d => d.data());
      saveLocal();
      // refresh view if admin/teacher is watching submissions
      if (data.currentUser && (data.currentUser.role === 'admin' || data.currentUser.role === 'teacher')) {
        const liveViews = ['dashboard', 'exam-detail', 'analytics', 'exam-analysis'];
        if (liveViews.includes(currentView)) render();
      }
    }, err => console.error('Submissions listener error:', err));
}

function saveData() {
  saveLocal();
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async () => {
    if (isFirebaseReady()) await saveToCloud();
    else updateSyncStatus('offline');
  }, 800);
}

async function saveDataNow() {
  saveLocal();
  if (syncTimeout) clearTimeout(syncTimeout);
  if (isFirebaseReady()) {
    updateSyncStatus('syncing');
    await saveToCloud();
  } else {
    updateSyncStatus('offline');
  }
}

async function initData() {
  // 1. Load from localStorage first (instant)
  const localData = loadLocal();
  if (localData && localData.users) {
    data = { ...data, ...localData };
    if (!data.activityLog) data.activityLog = [];
  }

  // 2. Try to init Firebase
  const fbCfg = getFirebaseConfig();
  if (fbCfg && fbCfg.apiKey && fbCfg.projectId) {
    const ok = initFirebase(fbCfg);
    if (ok) {
      // 3. Load config from Firestore
      const cloudData = await loadFromCloud();
      if (cloudData && cloudData.users) {
        const preservedUser = data.currentUser;
        data = { ...data, ...cloudData };
        if (!data.activityLog) data.activityLog = [];
        if (preservedUser) data.currentUser = preservedUser;
        saveLocal();
      }
      // 4. Load submissions
      const subs = await loadSubmissionsFromCloud();
      if (subs) { data.submissions = subs; saveLocal(); }
      // 5. Start real-time listener for submissions
      startSubmissionsListener();
      updateSyncStatus('idle');
    } else {
      updateSyncStatus('error');
    }
  } else {
    updateSyncStatus('offline');
  }
}

async function saveFirebaseSettings() {
  const apiKey = document.getElementById('fb-apikey').value.trim();
  const projectId = document.getElementById('fb-projectid').value.trim();
  const appId = document.getElementById('fb-appid').value.trim();
  if (!apiKey || !projectId) { alert('apiKey болон projectId заавал оруулна уу!'); return; }
  const cfg = {
    apiKey, projectId,
    appId: appId || undefined,
    authDomain: `${projectId}.firebaseapp.com`,
    storageBucket: `${projectId}.appspot.com`
  };
  saveFirebaseConfig(cfg);
  const ok = initFirebase(cfg);
  if (!ok) { alert('❌ Firebase холбогдоход алдаа гарлаа. Тохируулгаа шалгана уу.'); return; }
  updateSyncStatus('syncing');
  const cloudData = await loadFromCloud();
  if (cloudData && cloudData.users) {
    const preservedUser = data.currentUser;
    data = { ...data, ...cloudData };
    if (preservedUser) data.currentUser = preservedUser;
  }
  const subs = await loadSubmissionsFromCloud();
  if (subs) data.submissions = subs;
  startSubmissionsListener();
  saveLocal();
  updateSyncStatus('idle');
  closeModal();
  alert('✅ Firebase амжилттай холбогдлоо!\n\nОдоо ' + (data.submissions.length) + ' илгээлт татагдсан байна.');
  render();
}

async function migrateFromLocal() {
  if (!confirm('Локал өгөгдлийг Firebase-д байршуулах уу? Хуучин cloud өгөгдөл дарагдана.')) return;
  closeModal();
  updateSyncStatus('syncing');
  // Upload config
  await saveToCloud();
  // Upload submissions
  const subs = data.submissions || [];
  let count = 0;
  for (const sub of subs) {
    await saveSubmissionToCloud(sub);
    count++;
  }
  updateSyncStatus('synced');
  alert(`✅ ${count} илгээлт байршуулагдлаа!`);
}

function disconnectFirebase() {
  if (!confirm('Firebase-аас салгах уу?')) return;
  localStorage.removeItem(FB_CONFIG_KEY);
  if (submissionsUnsubscribe) { submissionsUnsubscribe(); submissionsUnsubscribe = null; }
  try { if (fbApp) fbApp.delete(); } catch {}
  fbApp = null; db = null;
  updateSyncStatus('offline');
  closeModal();
}

    userId: data.currentUser ? data.currentUser.id : null,

  };
  data.activityLog.unshift(entry);

}

  const username = (document.getElementById('teacher-username').value || '').trim();
  const pwd = (document.getElementById('teacher-password').value || '').trim();
  const errBox = document.getElementById('login-error');
  if (!username || !pwd) { errBox.textContent = 'Нэвтрэх нэр болон нууц үгийг оруулна уу!'; errBox.classList.remove('hidden'); return; }
  const user = data.users.find(u => (u.role === 'admin' || u.role === 'teacher') && u.regNumber === username && u.password === pwd);
  if (!user) { errBox.textContent = 'Нэвтрэх нэр эсвэл нууц үг буруу байна!'; errBox.classList.remove('hidden'); return; }

function handleStudentLogin() {
  const reg = (document.getElementById('student-username').value || '').trim();

  if (!pwd) { errBox.textContent = 'Нууц үгээ оруулна уу!'; errBox.classList.remove('hidden'); return; }

function parseQuestions(text, basePoints) {
  const questions = [];
  const blocks = text.split(/\n\s*\n/).filter(b => b.trim());
  blocks.forEach((block, idx) => {
    const lines = block.split('\n').map(l => l.trim()).filter(l => l);
    if (lines.length === 0) return;
    let questionText = lines[0].replace(/^\d+[\.\)]\s*/, '').trim();
    const optionLines = lines.slice(1);
    const isTrueFalse = optionLines.length <= 2 && optionLines.every(l => /^(Үнэн|Худал|Тийм|Үгүй|True|False)/i.test(l));
    if (isTrueFalse && optionLines.length > 0) {
      const correctLine = optionLines.find(l => /[*+]/.test(l)) || optionLines[0];
      const isTrue = /^(Үнэн|Тийм|True)/i.test(correctLine);
      questions.push({ id: Date.now() + idx, type: 'truefalse', question: questionText, correctAnswer: isTrue, points: basePoints });
    } else if (optionLines.length >= 2) {
      const options = [];
      let correctIdx = 0;
      optionLines.forEach((line, i) => {
        const hasMarker = /[*+]/.test(line);
        let cleaned = line.replace(/^[A-DА-Я][\.\)]\s*/i, '').replace(/[*+]/g, '').trim();
        options.push(cleaned);
        if (hasMarker) correctIdx = i;
      });
      while (options.length < 4) options.push('');
      questions.push({ id: Date.now() + idx, type: 'multiple', question: questionText, options: options.slice(0, 4), correctAnswer: correctIdx, points: basePoints, image: '' });
    }
  });
  return questions;
}
function doBulkImport() {
  const title = document.getElementById('bi-title').value;
  const subject = document.getElementById('bi-subject').value;
  if (!title || !subject) { alert('Гарчиг ба хичээл оруулна уу!'); return; }
  const text = document.getElementById('bi-text').value;
  if (!text.trim()) { alert('Асуултын текст оруулна уу!'); return; }
  const basePoints = parseInt(document.getElementById('bi-points').value) || 10;
  const questions = parseQuestions(text, basePoints);
  if (questions.length === 0) { alert('Асуулт парсэлж чадсангүй! Форматыг шалгана уу.'); return; }
  const exam = {
    id: Date.now(), title, subject,
    grade: document.getElementById('bi-grade').value || '10',
    description: '',
    duration: parseInt(document.getElementById('bi-duration').value) || 45,
    passingScore: parseInt(document.getElementById('bi-passing').value) || 60,
    totalPoints: questions.reduce((s, q) => s + q.points, 0),
    questions, createdByName: data.currentUser.name, status: 'active',
    examCode: generateExamCode()
  };
  data.exams.push(exam);
  logActivity('Сорил үүсгэв', `[Хуулж] "${exam.title}" (${questions.length} асуулт, код: ${exam.examCode})`);
  saveData();
  alert(`✅ Амжилттай! ${questions.length} асуулт оруулагдлаа.\n\n🔑 Нууц код: ${exam.examCode}\n\nЭнэ кодыг сурагчдад өгнө үү!`);
  navigate('dashboard');
}

function addStudentToClassDirect(className) {
  const last = (document.getElementById('ns-last').value||'').trim();
  const first = (document.getElementById('ns-first').value||'').trim();
  const num = (document.getElementById('ns-num').value||'').padStart(4,'0');
  const pwd = document.getElementById('ns-pwd').value || '1234';
  if (!last||!first) { alert('Нэр оруулна уу!'); return; }
  if (!/^\d{4}$/.test(num)) { alert('РД дугаар 4 тоо байх ёстой!'); return; }
  const parts = className.split('-');
  const grade = parts[0], group = parts[1]||'А';
  const reg = grade + group + num;
  if (data.users.find(u => u.regNumber === reg)) { alert('Энэ РД дугаар аль хэдийн бүртгэлтэй!'); return; }
  const name = last + '.' + first;
  data.users.push({ id: Date.now(), regNumber: reg, password: pwd, name, role: 'student', grade: className });
  logActivity('Сурагч нэмэв', `${name} → ${className}`);
  saveDataNow().then(() => { closeModal(); navigate('uc-class-detail'); });
}

      <input id="bulk-pwd" type="text" value="1234" style="width:80px;padding:8px;border:2px solid #e5e7eb;border-radius:10px;font-size:16px!important;text-align:center;">
    </div>
    <div id="bulk-result" class="hidden" style="padding:10px;border-radius:10px;font-size:12px;margin-bottom:10px;"></div>
    <div style="display:flex;gap:8px;">
      <button onclick="doBulkAddToClass('${className}')" class="btn-primary btn-green" style="flex:1;">✓ Оруулах</button>
      <button onclick="closeModal()" class="btn-primary btn-gray" style="flex:1;">Хаах</button>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');

function doBulkAddToClass(className) {
  const text = document.getElementById('bulk-text').value.trim();
  const pwd = document.getElementById('bulk-pwd').value || '1234';
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
  const parts = className.split('-');
  const grade = parts[0], group = parts[1]||'А';
  let added=0, skipped=0;
  let rdCounter = data.users.filter(u=>u.role==='student'&&u.grade===className).length + 1;
  lines.forEach(line => {
    const p = line.trim().split(/\s+/);
    if (p.length < 2) { skipped++; return; }
    const name = p[0]+'.'+p[1];
    const rdRaw = p[2] ? p[2].padStart(4,'0') : String(rdCounter).padStart(4,'0');
    const reg = grade + group + rdRaw;
    if (data.users.find(u=>u.regNumber===reg)) { skipped++; return; }
    data.users.push({ id: Date.now()+Math.random(), regNumber: reg, password: pwd, name, role: 'student', grade: className });
    added++; rdCounter++;
  });
  saveDataNow();
  const res = document.getElementById('bulk-result');
  res.classList.remove('hidden');
  res.style.cssText = `padding:10px;border-radius:10px;font-size:12px;margin-bottom:10px;background:${added>0?'#f0fdf4':'#fef9c3'};border:2px solid ${added>0?'#bbf7d0':'#fde68a'};`;
  res.textContent = `✅ ${added} сурагч нэмэгдлээ${skipped>0?' • ⏭️ '+skipped+' алгасав':''}`;
}

function removeStudentFromClass(userId) {
  if (!confirm('Энэ сурагчийг ангиас хасах уу?')) return;
  const u = data.users.find(x=>x.id===userId);
  if (u) { u.grade = ''; }
  saveData();
  navigate('uc-class-detail');
}

  if (t.teachingClasses.includes(className)) {

function addUser(defaultRole) {

    const className = grade + '-' + group;

    const name = (document.getElementById('au-name') ? document.getElementById('au-name').value : '').trim();

function downloadTemplate(type) {
  const wb = XLSX.utils.book_new();
  const headers = type === 'student'
    ? [['Овог.Нэр', 'РД (Нэвтрэх код)', 'Нууц үг', 'Анги'], ['Батбаяр.Гэрэлмаа', '10А0001', '1234', '10-А']]
    : [['Овог.Нэр', 'Нэвтрэх код', 'Нууц үг', 'Судлагдахуун'], ['Болормаа.Сарнай', 'bagsh001', 'teacher1', 'Математик']];
  const ws = XLSX.utils.aoa_to_sheet(headers);
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, `${type === 'student' ? 'suraguud' : 'bagsh'}_template.xlsx`);
}
function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const role = document.getElementById('import-role').value;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      let added = 0, skipped = 0, errors = [];
      rows.slice(1).forEach((row, i) => {
        if (!row[0] || !row[1]) { errors.push(`Мөр ${i+2}: нэр эсвэл код дутуу`); skipped++; return; }
        const name = String(row[0]).trim();
        const regNumber = String(row[1]).trim();
        const password = String(row[2] || '1234').trim();
        const grade = String(row[3] || '').trim();
        if (data.users.find(u => u.regNumber === regNumber)) { errors.push(`${regNumber} аль хэдийн бүртгэлтэй`); skipped++; return; }
        data.users.push({ id: Date.now() + Math.random(), name, regNumber, password, role, grade: role === 'student' ? grade : '', subject: role === 'teacher' ? grade : '' });
        added++;
      });
      saveData();
      const res = document.getElementById('import-result');
      res.classList.remove('hidden');
      res.style.background = added > 0 ? '#f0fdf4' : '#fef9c3';
      res.style.border = `2px solid ${added > 0 ? '#bbf7d0' : '#fde68a'}`;
      res.innerHTML = `✅ ${added} хэрэглэгч нэмэгдлээ${skipped > 0 ? ` • ⏭️ ${skipped} алгасав` : ''}${errors.length ? '<br><small style="color:#dc2626;">' + errors.slice(0,3).join('<br>') + '</small>' : ''}`;
      logActivity('Excel оруулав', `${added} ${role === 'student' ? 'сурагч' : 'багш'} нэмэгдлээ`);
    } catch(err) { alert('Excel файл уншихад алдаа гарлаа: ' + err.message); }
  };
  reader.readAsBinaryString(file);
}

function doClassImport(classId) {
  const cls = data.classes ? data.classes.find(c => c.id === classId) : null;
  if (!cls) return;
  const text = document.getElementById('class-import-text').value.trim();
  const pwd = document.getElementById('class-import-pwd').value || '1234';
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
  if (!lines.length) { alert('Нэрсийн жагсаалт оруулна уу!'); return; }
  const existingStudents = data.users.filter(u => u.role === 'student' && u.grade === cls.name);
  let rdCounter = existingStudents.length + 1;
  let added = 0, skipped = 0, errLines = [];
  lines.forEach((line, i) => {
    const parts = line.trim().split(/\s+/);
    if (parts.length < 2) { errLines.push(`Мөр ${i+1}: "${line}"`); skipped++; return; }
    const lastname = parts[0], firstname = parts[1];
    const rdRaw = parts[2] ? parts[2].padStart(4,'0') : String(rdCounter).padStart(4,'0');
    const name = lastname + '.' + firstname;
    const reg = cls.grade + cls.group + rdRaw;
    if (data.users.find(u => u.regNumber === reg)) { errLines.push(`${reg} аль хэдийн бүртгэлтэй`); skipped++; return; }
    data.users.push({ id: Date.now() + Math.random(), name, regNumber: reg, password: pwd, role: 'student', grade: cls.name });
    added++; rdCounter++;
  });
  saveData();
  const res = document.getElementById('class-import-result');
  res.classList.remove('hidden');
  res.style.background = added > 0 ? '#f0fdf4' : '#fef9c3';
  res.style.border = `2px solid ${added > 0 ? '#bbf7d0' : '#fde68a'}`;
  res.innerHTML = `✅ ${added} сурагч нэмэгдлээ${skipped>0?' • ⏭️ '+skipped+' алгасав':''}${errLines.length?'<br><small style="color:#dc2626;">'+errLines.slice(0,3).join('<br>')+'</small>':''}`;
}

function startExam(examId) {
  currentExam = data.exams.find(e => e.id === examId);
  currentAnswers = {};
  timeRemaining = currentExam.duration * 60;
  if (timerInterval) clearInterval(timerInterval);
  // Show floating timer
  const timerEl = document.getElementById('timer-float');
  timerEl.classList.remove('hidden');
  timerInterval = setInterval(() => {
    timeRemaining--;
    const m = Math.floor(timeRemaining/60), s = timeRemaining%60;
    const str = `${m}:${s.toString().padStart(2,'0')}`;
    timerEl.textContent = str;
    const t = document.getElementById('timer-display');
    if (t) t.textContent = str;
    if (timeRemaining < 300) {
      timerEl.style.background = '#ef4444';
      if (t) t.classList.add('timer-warning');
    }
    if (timeRemaining <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
  navigate('taking-exam');
}

function setAnswer(qIdx, val) { currentAnswers[qIdx] = val; }

async function submitExam() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('timer-float').classList.add('hidden');
  const exam = currentExam;
  let score = 0;
  const answers = [];
  exam.questions.forEach((q, i) => {
    const ans = currentAnswers[i];
    answers.push(ans);
    if (q.type === 'multiple' && ans === q.correctAnswer) score += q.points;
    if (q.type === 'truefalse' && ans === q.correctAnswer) score += q.points;
  });
  const percentage = Math.round((score / exam.totalPoints) * 100);
  const submission = {
    id: Date.now(), examId: exam.id, studentId: data.currentUser.id,
    studentName: data.currentUser.name, regNumber: data.currentUser.regNumber,
    grade: data.currentUser.grade, submittedAt: new Date().toLocaleString('mn-MN'),
    duration: Math.floor((exam.duration*60 - timeRemaining)/60),
    answers, score, percentage, passed: score >= exam.passingScore
  };

  // Save to Firestore directly (no conflict possible — own document)
  const saved = await saveSubmissionToCloud(submission);
  if (!saved) {
    // Fallback: save locally
    data.submissions.push(submission);
    saveData();
  } else {
    // Also update local cache
    data.submissions.push(submission);
    saveLocal();
  }

  logActivity('Сорил өгсөн', `"${exam.title}" - ${score}/${exam.totalPoints} (${percentage}%, ${submission.passed?'тэнцсэн':'унасан'})`);
  saveData();
  window.lastSubmission = submission;
  navigate('results');
}

    <p class="section-title">Илгээсэн постерууд (${data.posters.length})</p>
    <div>
      ${data.posters.length === 0 ? `<div style="text-align:center;padding:40px;background:white;border-radius:20px;color:#9ca3af;"><div style="font-size:48px;margin-bottom:12px;">🖼️</div><p style="font-weight:700;">Постер байхгүй</p></div>` :
        [...data.posters].reverse().map(p => `
          <div class="card" style="margin-bottom:12px;overflow:hidden;">
            ${p.imageData ? `<img src="${p.imageData}" alt="${p.title}" style="width:100%;max-height:250px;object-fit:cover;display:block;">` :
              p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.title}" style="width:100%;max-height:250px;object-fit:cover;display:block;" onerror="this.style.display='none'">` : ''}
            <div style="padding:14px;">
              <div style="font-weight:900;font-size:15px;margin-bottom:4px;">${p.title}</div>
              ${p.description ? `<div style="font-size:13px;color:#374151;margin-bottom:8px;">${p.description}</div>` : ''}
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="font-size:11px;color:#9ca3af;">📅 ${p.date} • 👤 ${p.createdBy}</div>
                ${(isAdmin || data.currentUser.name === p.createdBy) ? `<button onclick="deletePoster(${p.id})" style="background:#fef2f2;color:#dc2626;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;">🗑️</button>` : ''}
              </div>
            </div>
          </div>`).join('')}
    </div>`;
}

let posterImageData = '';
function handlePosterUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    posterImageData = e.target.result;
    document.getElementById('poster-preview').innerHTML = `<img src="${posterImageData}" style="width:100%;border-radius:12px;max-height:200px;object-fit:cover;">`;
  };
  reader.readAsDataURL(file);
}

function sendPoster() {
  const title = document.getElementById('poster-title').value.trim();
  if (!title) { alert('Гарчиг оруулна уу!'); return; }
  const imageUrl = document.getElementById('poster-img').value.trim();
  const description = document.getElementById('poster-desc').value.trim();
  const target = document.getElementById('poster-target').value;
  if (!data.posters) data.posters = [];
  data.posters.push({
    id: Date.now(), title, description, imageUrl,
    imageData: posterImageData,
    target, date: new Date().toISOString().split('T')[0],
    createdBy: data.currentUser.name, createdById: data.currentUser.id
  });
  posterImageData = '';
  logActivity('Постер илгээв', `"${title}"`);
  saveData(); render();
  alert('✅ Постер амжилттай илгээгдлээ!');
}

function deletePoster(id) {
  if (!confirm('Устгах уу?')) return;
  data.posters = data.posters.filter(p => p.id !== id);
  saveData(); render();
}

// ============ AVAILABLE EXAMS (student) ============

  const mySubmissions = data.submissions.filter(s => s.studentId === user.id);
  const availableExams = data.exams.filter(e => e.status === 'active');
  const doneIds = mySubmissions.map(s => s.examId);
  const pending = availableExams.filter(e => !doneIds.includes(e.id));
  const done = availableExams.filter(e => doneIds.includes(e.id));
  return `
    <div style="background:linear-gradient(135deg,#10b981,#059669);border-radius:20px;padding:20px;margin-bottom:16px;color:white;">

      <h2 style="font-size:22px;font-weight:900;margin:0;">📝 Өгөх сорилууд</h2>
    </div>

    ${pending.length === 0 ? `<div style="text-align:center;padding:30px;background:white;border-radius:16px;color:#9ca3af;margin-bottom:14px;"><p style="font-weight:700;">Өгөх сорил байхгүй</p></div>` :

        <div class="card" style="padding:16px;margin-bottom:10px;">

            <span class="badge" style="background:#dbeafe;color:#1d4ed8;">${exam.subject}</span>
            <span class="badge" style="background:#ede9fe;color:#6d28d9;">${exam.questions.length} асуулт</span>
            <span class="badge" style="background:#dcfce7;color:#166534;">${exam.duration} мин</span>
          </div>
          <button onclick="startExam(${exam.id})" class="btn-primary btn-green">🚀 Эхлүүлэх</button>
        </div>`).join('')}
    <p class="section-title">✅ Өгсөн сорил (${done.length})</p>

        <div class="card" style="padding:14px;margin-bottom:8px;">

// ============ EXAM ANALYSIS ============
let analysisExamId = null;
function renderExamAnalysis() {
  const exam = data.exams.find(e => e.id === analysisExamId);
  if (!exam) return renderAdminDashboard();
  const subs = data.submissions.filter(s => s.examId === exam.id);
  const totalQ = exam.questions.length;
  const totalPts = exam.totalPoints;
  const avg = subs.length > 0 ? Math.round(subs.reduce((s,x)=>s+x.percentage,0)/subs.length) : 0;
  const levelCounts = {VIII:0,VII:0,VI:0,V:0,IV:0,III:0,II:0,I:0};
  subs.forEach(s => {
    const lvl = s.percentage>=90?'VIII':s.percentage>=80?'VII':s.percentage>=70?'VI':s.percentage>=60?'V':s.percentage>=50?'IV':s.percentage>=40?'III':s.percentage>=30?'II':'I';
    levelCounts[lvl]++;
  });
  // Per question stats
  const qStats = exam.questions.map((q,i) => {
    const correct = subs.filter(s => s.answers && s.answers[i] === q.correctAnswer).length;
    const pct = subs.length > 0 ? Math.round(correct/subs.length*100) : 0;
    return { q, i, correct, total: subs.length, pct };
  });
  return `
    <button onclick="navigate('exam-detail',${exam.id})" style="display:flex;align-items:center;gap:6px;color:#1d4ed8;background:none;border:none;font-weight:800;font-size:15px;cursor:pointer;padding:0;margin-bottom:14px;">← Буцах</button>
    <div style="background:linear-gradient(135deg,#0d9488,#0f766e);border-radius:20px;padding:20px;margin-bottom:14px;color:white;">
      <p style="opacity:0.8;font-size:12px;margin:0 0 4px;">Хөндлөнгийн үнэлгээний анализ</p>
      <h2 style="font-size:18px;font-weight:900;margin:0 0 4px;">${exam.title}</h2>
      <p style="opacity:0.8;font-size:12px;margin:0;">${exam.subject} • ${exam.grade}-р анги • ${subs.length} сурагч</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
      <div style="background:white;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
        <div style="font-size:20px;font-weight:900;color:#1d4ed8;">${subs.length}</div>
        <div style="font-size:10px;color:#6b7280;">Оролцогч</div>
      </div>
      <div style="background:white;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
        <div style="font-size:20px;font-weight:900;color:#10b981;">${avg}%</div>
        <div style="font-size:10px;color:#6b7280;">Дундаж</div>
      </div>
      <div style="background:white;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
        <div style="font-size:20px;font-weight:900;color:#f59e0b;">${totalPts}</div>
        <div style="font-size:10px;color:#6b7280;">Нийт оноо</div>
      </div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:14px;">
      <p style="font-weight:900;font-size:14px;margin:0 0 10px;">📊 Түвшингүүдийн тоо</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${Object.entries(levelCounts).map(([lvl,cnt]) => `
          <div style="background:${cnt>0?'#eff6ff':'#f9fafb'};border:2px solid ${cnt>0?'#3b82f6':'#e5e7eb'};border-radius:10px;padding:8px 12px;text-align:center;min-width:52px;">
            <div style="font-weight:900;font-size:18px;color:${cnt>0?'#1d4ed8':'#9ca3af'};">${cnt}</div>
            <div style="font-size:11px;color:#6b7280;">${lvl}</div>
          </div>`).join('')}
      </div>
    </div>
    <p class="section-title">📋 Сурагч бүрийн дүн</p>
    <div class="analysis-wrap">
      <table class="atbl">
        <thead>
          <tr>
            <th>№</th><th>Овог нэр</th>
            ${exam.questions.map((_,i) => `<th>${i+1}</th>`).join('')}
            <th>Авах</th><th>Авсан</th><th>Хувь</th><th>Түвшин</th>
          </tr>
          <tr>
            <th colspan="2">Даалгавар оноо</th>
            ${exam.questions.map(q => `<th style="color:#1d4ed8;">${q.points}</th>`).join('')}
            <th colspan="4"></th>
          </tr>
        </thead>
        <tbody>
          ${subs.map((s,idx) => {
            const lvl = s.percentage>=90?'VIII':s.percentage>=80?'VII':s.percentage>=70?'VI':s.percentage>=60?'V':s.percentage>=50?'IV':s.percentage>=40?'III':s.percentage>=30?'II':'I';
            return `<tr>
              <td>${idx+1}</td>
              <td style="text-align:left;font-weight:700;">${s.studentName}</td>
              ${exam.questions.map((q,qi) => {
                const ans = s.answers ? s.answers[qi] : undefined;
                const correct = ans === q.correctAnswer;
                return `<td style="color:${correct?'#166534':'#9ca3af'};font-weight:${correct?'700':'400'};">${correct?q.points:0}</td>`;
              }).join('')}
              <td style="font-weight:800;">${totalPts}</td>
              <td style="font-weight:800;color:#1d4ed8;">${s.score}</td>
              <td style="font-weight:800;">${s.percentage}%</td>
              <td style="font-weight:900;color:${s.percentage>=70?'#166534':s.percentage>=50?'#92400e':'#991b1b'};">${lvl}</td>
            </tr>`;
          }).join('')}
          <tr style="background:#f0f9ff;">
            <td colspan="2" style="font-weight:800;text-align:left;">Авах оноо</td>
            ${exam.questions.map(q => `<td style="font-weight:800;">${subs.length * q.points}</td>`).join('')}
            <td style="font-weight:800;">${subs.length * totalPts}</td>
            <td colspan="3"></td>
          </tr>
          <tr style="background:#eff6ff;">
            <td colspan="2" style="font-weight:800;text-align:left;">Авсан оноо</td>
            ${qStats.map(qs => `<td style="font-weight:800;color:#1d4ed8;">${qs.correct * qs.q.points}</td>`).join('')}
            <td style="font-weight:800;color:#1d4ed8;">${subs.reduce((t,s)=>t+s.score,0)}</td>
            <td colspan="3"></td>
          </tr>
          <tr style="background:#f0fdf4;">
            <td colspan="2" style="font-weight:800;text-align:left;">Гүйцэтгэл %</td>
            ${qStats.map(qs => `<td style="font-weight:800;color:#166534;">${qs.pct}%</td>`).join('')}
            <td colspan="4" style="font-weight:800;color:#166534;">${avg}%</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div style="margin-top:14px;padding:12px;background:#fef9c3;border-radius:12px;font-size:12px;color:#92400e;">
      <strong>Шалгалт авсан багш:</strong> ${exam.createdByName}
    </div>
    <button onclick="sendAnalysisToClassTeacher(${exam.id})" class="btn-primary btn-orange" style="margin-top:12px;">📤 Анги удирдсан багшид илгээх</button>`;
}

function sendAnalysisToClassTeacher(examId) {
  const exam = data.exams.find(e => e.id === examId);
  if (!exam) return;
  const teachers = data.users.filter(u => u.role === 'teacher' && u.id !== data.currentUser.id);
  if (teachers.length === 0) { alert('Илгээх багш олдсонгүй!'); return; }
  document.getElementById('modal-body').innerHTML = `
    <h3 style="font-size:18px;font-weight:900;margin-bottom:14px;">📤 Нэгтгэл илгээх</h3>
    <p style="font-size:13px;color:#6b7280;margin-bottom:14px;">"${exam.title}" сорилын нэгтгэлийг дараах багшид илгээнэ:</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">
      ${teachers.map(t => `
        <label style="display:flex;align-items:center;gap:10px;padding:12px;border:2px solid #e5e7eb;border-radius:12px;cursor:pointer;">
          <input type="radio" name="send-teacher" value="${t.id}" style="width:18px;height:18px;">
          <div><div style="font-weight:800;">${t.name}</div><div style="font-size:12px;color:#6b7280;">${t.subject||''} • ${t.regNumber}</div></div>
        </label>`).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="confirmSendAnalysis(${examId})" class="btn-primary btn-orange" style="flex:1;">✓ Илгээх</button>
      <button onclick="closeModal()" class="btn-primary btn-gray" style="flex:1;">Цуцлах</button>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');
}

function confirmSendAnalysis(examId) {
  const sel = document.querySelector('input[name="send-teacher"]:checked');
  if (!sel) { alert('Багш сонгоно уу!'); return; }
  const teacher = data.users.find(u => u.id === parseInt(sel.value));
  const exam = data.exams.find(e => e.id === examId);
  if (!data.sentAnalyses) data.sentAnalyses = [];
  data.sentAnalyses.push({
    id: Date.now(), examId, toTeacherId: teacher.id, toTeacherName: teacher.name,
    fromName: data.currentUser.name, date: new Date().toISOString().split('T')[0]
  });
  logActivity('Нэгтгэл илгээв', `"${exam.title}" → ${teacher.name}`);
  saveData(); closeModal();
  alert(`✅ "${exam.title}" сорилын нэгтгэл ${teacher.name} багшид илгээгдлээ!`);
}
